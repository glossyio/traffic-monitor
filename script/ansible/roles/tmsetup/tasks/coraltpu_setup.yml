---
# TMSetup - Coral TPU Setup tasks

- name: TMSetup - Coral TPU Setup - Download the .deb package
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/feranick/libedgetpu/releases/download/16.0TF2.{{ tmsetup_libedgetpu_version }}/libedgetpu1-std_16.0tf2.{{ tmsetup_libedgetpu_version }}.{{ ansible_facts['distribution_release'] }}_{{ tmsetup_dpkg_architecture }}.deb"
    dest: "{{ tmsetup_codedir }}/tmp/libedgetpu1-std.deb"
    mode: '0644'
    force: false

- name: TMSetup - Coral TPU Setup - Install the .deb package with apt
  become: true
  ansible.builtin.apt:
    deb: "{{ tmsetup_codedir }}/tmp/libedgetpu1-std.deb"
    state: present
    force: yes
    update_cache: false

...

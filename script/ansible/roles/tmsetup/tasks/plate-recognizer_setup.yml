---
# TMSetup - plate-recognizer Setup tasks

- name: TMSetup - plate-recognizer Setup - Create plate-recognizer Directories
  become: true
  loop:
    - '{{ tmsetup_codedir }}'
    - '{{ tmsetup_codedir }}/docker'
    - '{{ tmsetup_codedir }}/docker/plate-recognizer'
    - '{{ tmsetup_codedir }}/docker/plate-recognizer/license'
  ansible.builtin.file:
    group: '{{ tmsetup_codegroup }}'
    mode: '0750'
    owner: '{{ tmsetup_codeowner }}'
    path: '{{ item }}'
    state: directory
  notify: Restart plate-recognizer.service

- name: TMSetup - plate-recognizer Setup - Create plate-recognizer environment file
  become: true
  ansible.builtin.template:
    backup: true
    dest: '{{ tmsetup_codedir }}/docker/plate-recognizer/plate-recognizer.env'
    force: '{{ tmsetup_force_configs }}'
    group: '{{ tmsetup_codegroup }}'
    mode: '0640'
    owner: '{{ tmsetup_codeowner }}'
    src: docker/plate-recognizer/plate-recognizer.env.j2
  notify: Restart plate-recognizer.service

- name: TMSetup - plate-recognizer Setup - Create plate-recognizer container quadlet
  become: true
  ansible.builtin.template:
    backup: true
    dest: /etc/containers/systemd/plate-recognizer.container
    group: root
    mode: '0640'
    owner: root
    src: docker/plate-recognizer/plate-recognizer.container.j2
  notify: Restart plate-recognizer.service
...

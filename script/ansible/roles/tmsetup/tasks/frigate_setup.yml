---
# TMSetup - Frigate Setup tasks

- name: TMSetup - Frigate Setup - Create Frigate Directories
  become: true
  loop:
    - '{{ tmsetup_codedir }}'
    - '{{ tmsetup_codedir }}/frigate'
    - '{{ tmsetup_codedir }}/frigate/config'
    - '{{ tmsetup_codedir }}/frigate/storage'
  ansible.builtin.file:
    group: '{{ tmsetup_codegroup }}'
    mode: '0750'
    owner: '{{ tmsetup_codeowner }}'
    path: '{{ item }}'
    state: directory
  notify: Restart frigate.service

- name: TMSetup - Frigate Setup - Create Frigate container configuration files
  become: true
  loop:
    - frigate/config/config.yml
    - frigate/frigate.env
  ansible.builtin.template:
    backup: true
    dest: '{{ tmsetup_codedir }}/{{ item }}'
    force: '{{ tmsetup_force_configs }}'
    group: '{{ tmsetup_codegroup }}'
    mode: '0640'
    owner: '{{ tmsetup_codeowner }}'
    src: 'container/{{ item }}.j2'
  notify: Restart frigate.service

- name: TMSetup - Frigate Setup - Create frigate container file
  become: true
  ansible.builtin.template:
    dest: /etc/containers/systemd/frigate.container
    group: root
    mode: '0644'
    owner: root
    src: container/frigate/frigate.container.j2
  notify: Restart frigate.service

...

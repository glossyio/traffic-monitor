---
# TMSetup - Frigate Setup tasks

- name: TMSetup - Frigate Setup - Create Frigate Directories
  become: true
  loop:
    - '{{ tmsetup_codedir }}'
    - '{{ tmsetup_codedir }}/docker'
    - '{{ tmsetup_codedir }}/docker/frigate'
    - '{{ tmsetup_codedir }}/docker/frigate/config'
    - '{{ tmsetup_codedir }}/docker/frigate/config/model_cache'
    - '{{ tmsetup_codedir }}/docker/frigate/storage'
  ansible.builtin.file:
    group: '{{ tmsetup_codegroup }}'
    mode: '0750'
    owner: '{{ tmsetup_codeowner }}'
    path: '{{ item }}'
    state: directory
  notify: Restart tm-docker service

- name: TMSetup - Frigate Setup - Create Frigate docker files
  become: true
  loop:
    - docker/frigate/config/config.yml
    - docker/frigate/docker-compose-frigate.yaml
    - docker/frigate/frigate.env
  ansible.builtin.template:
    backup: true
    dest: '{{ tmsetup_codedir }}/{{ item }}'
    force: '{{ tmsetup_force_configs }}'
    group: '{{ tmsetup_codegroup }}'
    mode: '0640'
    owner: '{{ tmsetup_codeowner }}'
    src: '{{ item }}.j2'
  notify:
    - Build container images
    - Restart tm-docker service

- name: TMSetup - Frigate Setup - Coral TPU model - Download the open source yolov9 model
  when: ((tmsetup_detectors.edgetpu_pci.dev_path_available | default(false) and tmsetup_detectors.edgetpu_pci.exists | default(false)) or tmsetup_detectors.edgetpu_pci.fresh_install | default(false)) or 
        ((tmsetup_detectors.edgetpu_usb.dev_path_available | default(false) and tmsetup_detectors.edgetpu_usb.exists | default(false)) or tmsetup_detectors.edgetpu_usb.fresh_install | default(false))
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/dbro/frigate-detector-edgetpu-yolo9/releases/download/v1.5/yolov9-s-hardswish-tpumax_320_int8_edgetpu.tflite"
    dest: "{{ tmsetup_codedir }}/docker/frigate/config/model_cache/yolov9-s-hardswish-tpumax_320_int8_edgetpu.tflite"
    mode: '0644'
    force: false

- name: TMSetup - Frigate Setup - Coral TPU model - Download the labels for the open source yolov9 model
  when: ((tmsetup_detectors.edgetpu_pci.dev_path_available | default(false) and tmsetup_detectors.edgetpu_pci.exists | default(false)) or tmsetup_detectors.edgetpu_pci.fresh_install | default(false)) or 
        ((tmsetup_detectors.edgetpu_usb.dev_path_available | default(false) and tmsetup_detectors.edgetpu_usb.exists | default(false)) or tmsetup_detectors.edgetpu_usb.fresh_install | default(false))
  become: true
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/dbro/frigate-detector-edgetpu-yolo9/refs/heads/main/labels-coco17.txt"
    dest: "{{ tmsetup_codedir }}/docker/frigate/config/labels-coco17.txt"
    mode: '0644'
    force: false
...
